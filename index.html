<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilmil Singh Soach | Portfolio</title>
    <style>
        :root { --bg: #f8f9fa; --card-bg: #ffffff; --text: #333; --accent: #4A90E2; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
        h1 { margin-bottom: 10px; color: #222; }
        .subtitle { color: #666; margin-bottom: 40px; font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; width: 100%; max-width: 900px; }
        .project-card { background: var(--card-bg); border-radius: 15px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: transform 0.2s; border: 1px solid #eee; }
        .project-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .project-tag { background: #eef2f7; color: var(--accent); padding: 4px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        h3 { margin: 15px 0 10px 0; }
        p { font-size: 0.95rem; color: #555; line-height: 1.5; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: var(--accent); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }
        .btn:hover { background-color: #357ABD; }
    </style>
</head>
<body>

    <h1>Dilmil Singh Soach</h1>
    <p class="subtitle">Civil Services >> Python | Data Analytics</p>

    <div class="grid">
        <div class="project-card">
            <span class="project-tag">FULL STACK</span>
            <h3>Basic Python Calculator</h3>
            <p>A cloud-deployed calculator using SymPy for basic maths and Reflex for real-time state management. Features a smooth Dark Mode toggle.</p>
            <a href="calculator.html" class="btn">Launch App →</a>
        </div>

       
    </div>

</body>
</html>
